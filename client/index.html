<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="مُهِمَّة" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="مُهِمَّة" />
    <meta name="msapplication-TileColor" content="#1e40af" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimum-scale=1.0, interactive-widget=resizes-content" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="description" content="مُهِمَّة - تطبيق إدارة المهام التفاعلي للفريق مع دردشة فورية وإدارة المهام" />
    <meta name="keywords" content="إدارة مهام, تطبيق فريق, دردشة, إنتاجية" />
    <title>مُهِمَّة | إدارة مهام وتواصل الفريق</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        touch-action: manipulation;
      }
      body {
        background-color: #0f172a;
      }
      #splash-screen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #ff5f38 0%, #ff8c70 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
        font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash-screen svg {
        width: 80px;
        height: 80px;
        animation: splashPulse 1.2s ease-in-out infinite;
        filter: drop-shadow(0 8px 24px rgba(0,0,0,0.2));
      }
      #splash-screen h1 {
        color: #fff;
        font-size: 1.8rem;
        font-weight: 900;
        margin-top: 16px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      }
      #splash-screen p {
        color: rgba(255,255,255,0.8);
        font-size: 0.9rem;
        margin-top: 4px;
      }
      #splash-screen .splash-dots {
        display: flex;
        gap: 8px;
        margin-top: 32px;
      }
      #splash-screen .splash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.4);
        animation: splashDot 1.4s ease-in-out infinite;
      }
      #splash-screen .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      #splash-screen .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      @keyframes splashDot {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <svg width="80" height="80" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="60" height="60" rx="18" fill="url(#splashGrad)" />
        <path d="M42 20L25.5 36.5L18 29" stroke="white" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" />
        <circle cx="42" cy="18" r="4" fill="#DBEAFE" />
        <defs>
          <linearGradient id="splashGrad" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
            <stop stopColor="#ff8c70" />
            <stop offset="1" stopColor="#ff5f38" />
          </linearGradient>
        </defs>
      </svg>
      <h1>مُهِمَّة</h1>
      <p>إدارة مهام الفريق</p>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
