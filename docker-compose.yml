version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      # Persist SQLite database directly as a host-mapped volume
      - ./server/database.sqlite:/usr/src/app/database.sqlite
      # Persist server logs
      - ./server/logs:/usr/src/app/logs
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (res) => { if (res.statusCode === 200) { process.exit(0); } else { process.exit(1); } }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_WS_URL=ws://localhost:5000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
